openapi: 3.1.0
info:
  title: Miller Excavation API
  version: 1.0.0
servers:
  - url: /api
paths:
  /contact:
    post:
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactSubmission'
      responses:
        '201':
          description: Contact submission received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '500':
          description: Server error while processing submission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
    post:
      summary: Submit health check data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthPayload'
      responses:
        '201':
          description: Health check data received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthPostResponse'
components:
  schemas:
    ContactSubmission:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        customMessage:
          type: string
        location:
          $ref: '#/components/schemas/Location'
    Location:
      type: object
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        address:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
    ContactResponse:
      type: object
      properties:
        success:
          type: boolean
        contactId:
          type: string
          format: uuid
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: UP
    HealthPayload:
      type: object
      description: Arbitrary JSON payload for health POST
      additionalProperties: true
    HealthPostResponse:
      type: object
      properties:
        received:
          $ref: '#/components/schemas/HealthPayload'
        message:
          type: string
